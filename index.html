<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>LightningBet • Probabilità Over NBA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: white; }
        .logo-font { font-family: 'Space Grotesk', sans-serif; font-weight: 700; }
        button { user-select: none; -webkit-tap-highlight-color: transparent; }
        #playerSelect { min-height: 44px; }
    </style>
</head>
<body class="min-h-screen">

<nav class="bg-black/90 backdrop-blur-md border-b border-yellow-600/30 sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <!-- SOSTITUISCI CON IL TUO LOGO -->
            <img src="https://i.imgur.com/TUOILOGOQUI.png" alt="LightningBet Logo" class="h-14 w-auto object-contain">
            <span class="text-3xl md:text-4xl font-bold logo-font text-yellow-400 tracking-tight">LightningBet</span>
        </div>
        <button onclick="document.getElementById('analyzer').scrollIntoView({behavior:'smooth'})" 
                class="px-7 py-3 bg-gradient-to-r from-yellow-500 to-amber-500 hover:from-yellow-400 hover:to-amber-400 text-black font-bold rounded-2xl transition flex items-center gap-2 shadow-lg">
            <i class="fa-solid fa-bolt"></i> Inizia Analisi
        </button>
    </div>
</nav>

<section id="analyzer" class="max-w-6xl mx-auto px-6 py-16">
    <h1 class="text-5xl md:text-6xl font-bold logo-font text-center mb-4 text-yellow-400">LightningBet</h1>
    <p class="text-center text-xl text-zinc-300 mb-3">Probabilità Over NBA</p>
    <p class="text-center text-zinc-500 mb-12">Statistiche aggiornate live (balldontlie.io)</p>

    <div class="bg-zinc-900/80 border border-yellow-600/30 rounded-3xl p-8 md:p-12 shadow-2xl">
        <div class="grid md:grid-cols-2 gap-10">
            <!-- FORM -->
            <div class="space-y-8">
                <div>
                    <label class="block text-sm text-zinc-300 mb-2 font-medium uppercase tracking-wide">Giocatore</label>
                    <select id="playerSelect" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-5 py-4 text-lg focus:border-yellow-500 outline-none">
                        <!-- Default statico per vedere subito i giocatori -->
                        <option value="">Caricamento giocatori...</option>
                        <option value="Nikola Jokic">Nikola Jokic (DEN)</option>
                        <option value="Luka Doncic">Luka Doncic (LAL)</option>
                        <option value="Shai Gilgeous-Alexander">Shai Gilgeous-Alexander (OKC)</option>
                        <option value="Giannis Antetokounmpo">Giannis Antetokounmpo (MIL)</option>
                        <option value="Victor Wembanyama">Victor Wembanyama (SAS)</option>
                        <option value="Anthony Edwards">Anthony Edwards (MIN)</option>
                        <option value="Jayson Tatum">Jayson Tatum (BOS)</option>
                        <option value="Stephen Curry">Stephen Curry (GSW)</option>
                        <option value="LeBron James">LeBron James (LAL)</option>
                        <option value="Tyrese Maxey">Tyrese Maxey (PHI)</option>
                        <option value="Ja Morant">Ja Morant (MEM)</option>
                        <option value="Devin Booker">Devin Booker (PHX)</option>
                        <option value="Donovan Mitchell">Donovan Mitchell (CLE)</option>
                        <option value="Jaylen Brown">Jaylen Brown (BOS)</option>
                        <option value="Karl-Anthony Towns">Karl-Anthony Towns (NYK)</option>
                        <option value="Chet Holmgren">Chet Holmgren (OKC)</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm text-zinc-300 mb-2 font-medium uppercase tracking-wide">Statistica</label>
                    <div class="grid grid-cols-4 gap-3">
                        <button data-stat="PTS" class="stat-btn bg-yellow-500 text-black py-4 rounded-xl font-semibold transition">Punti</button>
                        <button data-stat="REB" class="stat-btn border border-zinc-600 hover:border-yellow-500 py-4 rounded-xl font-semibold transition">Rimbalzi</button>
                        <button data-stat="AST" class="stat-btn border border-zinc-600 hover:border-yellow-500 py-4 rounded-xl font-semibold transition">Assist</button>
                        <button data-stat="3PM" class="stat-btn border border-zinc-600 hover:border-yellow-500 py-4 rounded-xl font-semibold transition">Triple</button>
                    </div>
                </div>

                <div>
                    <label class="block text-sm text-zinc-300 mb-2 font-medium uppercase tracking-wide">Linea Over</label>
                    <input id="lineInput" type="number" step="0.5" value="24.5" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-6 py-5 text-4xl font-bold text-center focus:border-yellow-500 outline-none"/>
                </div>

                <button id="calcBtn" class="w-full bg-gradient-to-r from-yellow-600 to-amber-600 hover:from-yellow-500 hover:to-amber-500 text-white font-bold text-xl py-6 rounded-2xl transition shadow-lg active:scale-98 flex items-center justify-center gap-3">
                    <i class="fa-solid fa-bolt"></i> CALCOLA PROBABILITÀ
                </button>
            </div>

            <!-- RISULTATO -->
            <div id="resultPanel" class="hidden bg-black/70 rounded-3xl p-10 border border-yellow-600/40 flex flex-col justify-center">
                <h3 class="text-2xl font-bold text-yellow-400 mb-6 text-center logo-font">Risultato</h3>
                <div class="text-center">
                    <div id="playerName" class="text-3xl font-bold mb-2"></div>
                    <div id="statLine" class="text-yellow-400 text-2xl mb-6"></div>
                    <div id="probabilityBig" class="text-9xl font-black text-yellow-400 leading-none">—</div>
                    <div class="text-4xl text-zinc-300">%</div>
                </div>
                <div class="mt-8 bg-zinc-900 rounded-2xl p-4 text-sm">
                    <div class="flex justify-between"><span class="text-zinc-400">Media stagionale</span><span id="avgStat" class="font-mono font-bold"></span></div>
                </div>
                <p class="mt-8 text-center text-zinc-400 text-xs">Dati aggiornati da balldontlie.io</p>
                <button onclick="resetAnalyzer()" class="mt-6 border border-zinc-600 hover:border-yellow-500 text-zinc-300 py-3 rounded-xl transition w-full">
                    Nuova Analisi
                </button>
            </div>

            <div id="placeholderPanel" class="text-center py-20 text-zinc-500 col-span-2">
                Caricamento statistiche live...
            </div>
        </div>
    </div>
</section>

<script>
// ==================== DATI FALLBACK (se API fallisce) ====================
const fallbackStats = {
    "Nikola Jokic":     { PTS: 28.7, REB: 13.5, AST: 9.2, "3PM": 1.4 },
    "Luka Doncic":      { PTS: 32.7, REB:  9.1, AST: 9.5, "3PM": 4.1 },
    "Shai Gilgeous-Alexander": { PTS: 31.0, REB: 5.8, AST: 6.4, "3PM": 1.8 },
    "Giannis Antetokounmpo": { PTS: 30.5, REB: 11.8, AST: 6.2, "3PM": 0.9 },
    "Victor Wembanyama": { PTS: 24.5, REB: 10.8, AST: 3.8, "3PM": 2.6 },
    "Anthony Edwards":  { PTS: 27.0, REB: 5.4, AST: 4.9, "3PM": 3.1 },
    "Jayson Tatum":     { PTS: 28.0, REB: 8.7, AST: 5.1, "3PM": 3.4 },
    "Stephen Curry":    { PTS: 26.5, REB: 4.6, AST: 6.3, "3PM": 5.2 },
    "LeBron James":     { PTS: 25.0, REB: 7.8, AST: 8.4, "3PM": 2.3 },
    "Tyrese Maxey":     { PTS: 26.8, REB: 3.7, AST: 6.8, "3PM": 3.9 },
    "Ja Morant":        { PTS: 25.2, REB: 5.6, AST: 8.1, "3PM": 1.7 },
    "Devin Booker":     { PTS: 27.1, REB: 4.3, AST: 6.9, "3PM": 3.2 },
    "Donovan Mitchell": { PTS: 26.9, REB: 4.1, AST: 5.8, "3PM": 3.8 },
    "Jaylen Brown":     { PTS: 25.4, REB: 6.2, AST: 3.9, "3PM": 2.8 },
    "Karl-Anthony Towns":{ PTS: 24.8, REB: 11.2, AST: 3.1, "3PM": 2.9 },
    "Chet Holmgren":    { PTS: 23.1, REB: 8.9, AST: 2.7, "3PM": 3.3 }
};

let playerStats = fallbackStats; // fallback di default
let selectedStat = "PTS";

// Popola select con fallback
function populateSelect() {
  const select = document.getElementById('playerSelect');
  select.innerHTML = '<option value="">Seleziona un giocatore</option>';
  Object.keys(playerStats).sort().forEach(name => {
    const opt = document.createElement('option');
    opt.value = name;
    opt.textContent = name;
    select.appendChild(opt);
  });
  document.getElementById('placeholderPanel').textContent = 'Seleziona un giocatore e calcola!';
}

// Carica dati live (se Netlify Function esiste)
async function loadLiveStats() {
  try {
    const res = await fetch('/.netlify/functions/get-nba-stats');
    if (!res.ok) throw new Error('Netlify function non risponde');
    playerStats = await res.json();
    console.log('✅ Dati live caricati');
  } catch (err) {
    console.warn('API live non disponibile → uso fallback:', err);
    playerStats = fallbackStats;
  }
  populateSelect(); // Popola sempre dopo tentativo
}

// Chiama all'avvio
loadLiveStats().then(() => {
  // Default stat
  document.querySelector('[data-stat="PTS"]').click();
});

// Selezione stat
document.querySelectorAll('.stat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.stat-btn').forEach(b => {
            b.classList.remove('bg-yellow-500', 'text-black');
            b.classList.add('border-zinc-600', 'text-white');
        });
        btn.classList.add('bg-yellow-500', 'text-black');
        selectedStat = btn.dataset.stat;
    });
});

// Calcolo
document.getElementById('calcBtn').addEventListener('click', () => {
    const player = document.getElementById('playerSelect').value;
    if (!player) {
        alert("Seleziona un giocatore prima!");
        return;
    }

    const line = parseFloat(document.getElementById('lineInput').value) || 20;
    const stats = playerStats[player] || { PTS: 22, REB: 6, AST: 5, "3PM": 2 };
    const avg = stats[selectedStat] || 5;

    let sensitivity = 7;
    if (selectedStat === "3PM") sensitivity = 13;
    if (selectedStat === "REB" || selectedStat === "AST") sensitivity = 6;

    let prob = Math.round(50 + (avg - line) * sensitivity);
    prob = Math.max(8, Math.min(94, prob));

    document.getElementById('playerName').textContent = player;
    document.getElementById('statLine').innerHTML = `Over <span class="font-mono">${line}</span> ${selectedStat}`;
    document.getElementById('probabilityBig').textContent = prob;
    document.getElementById('avgStat').textContent = `${avg} ${selectedStat}`;

    document.getElementById('placeholderPanel').classList.add('hidden');
    document.getElementById('resultPanel').classList.remove('hidden');
});

function resetAnalyzer() {
    document.getElementById('resultPanel').classList.add('hidden');
    document.getElementById('placeholderPanel').classList.remove('hidden');
}
</script>
</body>
</html>
